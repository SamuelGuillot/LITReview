{% extends 'reviews/base.html' %}
{% load static %}
{% block extra_css %}
<link rel="stylesheet" href="{% static 'tickets/tickets.css' %}">
{% endblock %}
{% block content %}

<div class="ticket-container ticket-create-page">
    <h2 class="form-title">Créer un ticket</h2>

    <form method="post" enctype="multipart/form-data" class="ticket-form">
        {% csrf_token %}

        <div class="form-field">
            <label for="{{ form.title.id_for_label }}">Titre</label>
            {{ form.title }}
        </div>

        <div class="form-field">
            <label for="{{ form.description.id_for_label }}">Description</label>
            {{ form.description }}
        </div>

        <div class="form-field">
            <label for="id_image">Image</label>
            <input type="file" name="image" id="id_image" accept="image/*" style="display:none;">
            <button type="button" class="btn-secondary" onclick="document.getElementById('id_image').click();">
                Télécharger fichier
            </button>
        </div>

        <div class="form-footer">
            <button type="submit" class="btn-submit">Envoyer</button>
        </div>
    </form>
</div>
{% endblock %}
